<!doctype html>

<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Part 2. 핵심 방법론</title>
        <link
            href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=JetBrains+Mono:wght@400;700&amp;family=Black+Han+Sans&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
            rel="stylesheet"
        />
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background-color: #1e1e1e;
                color: #ffffff;
                overflow: hidden;
            }
            .slide-container {
                width: 1280px;
                height: 720px;
                display: flex;
                flex-direction: column;
                position: relative;
                background-color: #1e1e1e;
                overflow: hidden;
            }
            .code-font {
                font-family: 'JetBrains Mono', monospace;
            }
            /* Background decorative elements */
            .bg-circle-1 {
                position: absolute;
                width: 800px;
                height: 800px;
                border-radius: 50%;
                background-color: rgba(
                    0,
                    122,
                    204,
                    0.03
                ); /* VS Code Blue transparent */
                top: -200px;
                right: -200px;
                left: auto;
                z-index: 0;
            }
            .bg-circle-2 {
                position: absolute;
                width: 600px;
                height: 600px;
                border-radius: 50%;
                background-color: rgba(255, 255, 255, 0.02);
                bottom: -100px;
                left: -100px;
                z-index: 0;
            }

            /* SVG Dot Pattern to replace gradient */
            .dot-pattern {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: url("data:image/svg+xml,%3Csvg width='30' height='30' viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%233e3e42' fill-opacity='0.4' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='1'/%3E%3C/g%3E%3C/svg%3E");
                opacity: 0.5;
                z-index: 0;
            }

            .part-number-bg {
                font-family: 'Black Han Sans', sans-serif;
                font-size: 400px;
                line-height: 1;
                position: absolute;
                color: rgba(255, 255, 255, 0.02);
                z-index: 0;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                white-space: nowrap;
                pointer-events: none;
            }

            .content-wrapper {
                z-index: 10;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100%;
                width: 100%;
            }

            .divider {
                width: 80px;
                height: 4px;
                background-color: #007acc; /* VS Code Blue */
                margin: 40px 0;
                border-radius: 2px;
            }

            .accent-corner {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 6px;
                background-color: #007acc;
                z-index: 20;
            }
        </style>
    </head>
    <body>
        <div class="slide-container">
            <div class="accent-corner"></div>
            <!-- Background Elements -->
            <div class="bg-circle-1"></div>
            <div class="bg-circle-2"></div>
            <div class="dot-pattern"></div>
            <!-- Giant Background Number -->
            <div class="part-number-bg">02</div>
            <!-- Main Content -->
            <div class="content-wrapper">
                <!-- Badge -->
                <div
                    class="mb-8 px-4 py-2 border border-blue-500 rounded-full bg-blue-900 bg-opacity-20 backdrop-filter backdrop-blur-sm"
                >
                    <p
                        class="text-blue-400 font-bold tracking-widest text-sm uppercase code-font m-0"
                    >
                        <i class="fas fa-cubes mr-2"></i>PART 02
                    </p>
                </div>
                <!-- Main Title -->
                <h1
                    class="text-7xl font-black text-white mb-2 text-center tracking-tight"
                    style="text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5)"
                >
                    핵심 <span class="text-blue-400">방법론</span>
                </h1>
                <!-- Divider -->
                <div class="divider"></div>
                <!-- Subtitle -->
                <div class="text-center max-w-4xl">
                    <p
                        class="text-3xl text-gray-400 font-light leading-relaxed m-0"
                    >
                        도구를 정렬하고, 프로세스를 합의하고, <br />
                        <span
                            class="text-gray-500 text-2xl mt-2 block font-normal"
                            >AI와 협업한다</span
                        >
                    </p>
                </div>
                <!-- Icon Decoration -->
                <div
                    class="mt-16 opacity-40 text-5xl text-gray-400 flex space-x-12 items-center"
                >
                    <div class="flex flex-col items-center">
                        <i class="fas fa-toolbox mb-2"></i>
                        <span class="text-xs font-mono">Tools</span>
                    </div>
                    <i class="fas fa-arrow-right text-2xl text-gray-700"></i>
                    <div class="flex flex-col items-center">
                        <i class="fas fa-tasks mb-2"></i>
                        <span class="text-xs font-mono">Process</span>
                    </div>
                    <i class="fas fa-arrow-right text-2xl text-gray-700"></i>
                    <div class="flex flex-col items-center">
                        <i class="fas fa-robot mb-2"></i>
                        <span class="text-xs font-mono">AI Pair</span>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>

<!doctype html>

<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Part 3. 바이브 코딩!</title>
        <link
            href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=JetBrains+Mono:wght@400;700&amp;family=Black+Han+Sans&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
            rel="stylesheet"
        />
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background-color: #1e1e1e;
                color: #ffffff;
                overflow: hidden;
            }
            .slide-container {
                width: 1280px;
                height: 720px;
                display: flex;
                flex-direction: column;
                position: relative;
                background-color: #1e1e1e;
                overflow: hidden;
            }
            .code-font {
                font-family: 'JetBrains Mono', monospace;
            }
            /* Background decorative elements */
            .bg-circle-1 {
                position: absolute;
                width: 800px;
                height: 800px;
                border-radius: 50%;
                background-color: rgba(
                    255,
                    65,
                    84,
                    0.03
                ); /* Reddish tint for "Vibe" */
                top: -200px;
                left: -200px;
                z-index: 0;
            }
            .bg-circle-2 {
                position: absolute;
                width: 600px;
                height: 600px;
                border-radius: 50%;
                background-color: rgba(255, 255, 255, 0.02);
                bottom: -100px;
                right: -100px;
                z-index: 0;
            }

            .dot-pattern {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                /* Minimal dot pattern using radial gradient - acceptable as pattern */
                background-image: radial-gradient(#3e3e42 1px, transparent 1px);
                background-size: 30px 30px;
                opacity: 0.3;
                z-index: 0;
            }

            .part-number-bg {
                font-family: 'Black Han Sans', sans-serif;
                font-size: 400px;
                line-height: 1;
                position: absolute;
                color: rgba(255, 255, 255, 0.02);
                z-index: 0;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                white-space: nowrap;
                pointer-events: none;
            }

            .content-wrapper {
                z-index: 10;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100%;
                width: 100%;
            }

            .divider {
                width: 80px;
                height: 4px;
                background-color: #ff4154; /* Vibe Red */
                margin: 40px 0;
                border-radius: 2px;
            }

            .accent-corner {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 6px;
                background-color: #ff4154;
                z-index: 20;
            }

            .flow-step {
                position: relative;
                padding: 0 10px;
            }
            .flow-arrow {
                color: #858585;
                font-size: 0.8em;
                margin: 0 5px;
            }
        </style>
    </head>
    <body>
        <div class="slide-container">
            <div class="accent-corner"></div>
            <!-- Background Elements -->
            <div class="bg-circle-1"></div>
            <div class="bg-circle-2"></div>
            <div class="dot-pattern"></div>
            <!-- Giant Background Number -->
            <div class="part-number-bg">03</div>
            <!-- Main Content -->
            <div class="content-wrapper">
                <!-- Badge -->
                <div
                    class="mb-8 px-4 py-2 border border-red-500 rounded-full bg-red-900 bg-opacity-20 backdrop-filter backdrop-blur-sm"
                >
                    <p
                        class="text-red-400 font-bold tracking-widest text-sm uppercase code-font m-0"
                    >
                        <i class="fas fa-circle mr-2 text-xs animate-pulse"></i
                        >PART 03
                    </p>
                </div>
                <!-- Main Title -->
                <h1
                    class="text-7xl font-black text-white mb-2 text-center tracking-tight"
                    style="text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5)"
                >
                    <span class="text-red-500">바이브 코딩!</span>
                </h1>
                <!-- Divider -->
                <div class="divider"></div>
                <!-- Subtitle -->
                <div class="text-center max-w-4xl px-8">
                    <p
                        class="text-2xl text-gray-400 font-light leading-relaxed m-0 mb-4"
                    >
                        목표: 계산기 Streamlit 만들어보기
                    </p>
                    <div
                        class="flex items-center justify-center flex-wrap text-xl text-gray-400 code-font bg-gray-800 bg-opacity-50 px-6 py-3 rounded-lg border border-gray-700"
                    >
                        <p class="m-0 flex items-center">
                            <span class="text-blue-300 font-bold">cursor skill</span>
                            <i class="fas fa-arrow-right flow-arrow"></i>
                            <span class="text-green-300 font-bold">template.md</span>
                            <i class="fas fa-arrow-right flow-arrow"></i>
                            <span class="text-yellow-300 font-bold">implementation(구현)</span>
                        </p>
                    </div>
                </div>
                <!-- Icon Decoration -->
                <div
                    class="mt-16 opacity-40 text-5xl text-gray-400 flex space-x-16 items-center"
                >
                    <div class="flex flex-col items-center">
                        <i class="fas fa-laptop-code mb-2"></i>
                        <span class="text-xs code-font">VIBE CODING</span>
                    </div>
                    <div
                        class="flex flex-col items-center text-red-500 opacity-80"
                    >
                        <i class="fas fa-video mb-2"></i>
                        <span class="text-xs code-font">ON AIR</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <i class="fas fa-users mb-2"></i>
                        <span class="text-xs code-font">INTERACTION</span>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>

<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Slide Notes Viewer</title>
        <script src="slides-config.js"></script>
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                background: #0d0d0d;
                color: #cccccc;
                font-family: 'Noto Sans KR', system-ui, sans-serif;
                overflow: hidden;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            #toolbar {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 16px;
                padding: 10px 16px;
                background: #1e1e1e;
                border-bottom: 1px solid #3e3e42;
                flex-shrink: 0;
            }
            #toolbar button {
                background: #007acc;
                color: #fff;
                border: none;
                padding: 8px 16px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 14px;
            }
            #toolbar button:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }
            #info {
                min-width: 280px;
                text-align: center;
                font-size: 14px;
                color: #9cdcfe;
            }
            #stage {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }
            #frame-wrap {
                transform-origin: center center;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            }
            #slide-frame {
                width: 1280px;
                height: 720px;
                border: none;
                display: block;
                background: #1e1e1e;
            }
            .hint {
                font-size: 12px;
                color: #6a6a6a;
                margin-left: 8px;
            }
        </style>
    </head>
    <body>
        <div id="toolbar">
            <button type="button" id="prev" aria-label="이전">← 이전</button>
            <span id="info">로딩 중…</span>
            <button type="button" id="next" aria-label="다음">다음 →</button>
            <span class="hint">← → Space · Home · End</span>
        </div>
        <div id="stage">
            <div id="frame-wrap">
                <iframe id="slide-frame" title="슬라이드"></iframe>
            </div>
        </div>
        <script>
            let index = 0;
            const frame = document.getElementById('slide-frame');
            const info = document.getElementById('info');
            const prevBtn = document.getElementById('prev');
            const nextBtn = document.getElementById('next');
            const wrap = document.getElementById('frame-wrap');

            function scale() {
                const stage = document.getElementById('stage');
                const scale = Math.min(
                    (stage.clientWidth - 48) / 1280,
                    (stage.clientHeight - 48) / 720,
                    1,
                );
                wrap.style.transform = 'scale(' + scale + ')';
            }

            function show(i) {
                if (typeof SLIDES === 'undefined' || !SLIDES.length) {
                    info.textContent = 'slides-config.js에 슬라이드가 없습니다.';
                    return;
                }
                index = Math.max(0, Math.min(i, SLIDES.length - 1));
                frame.src = 'slides/' + SLIDES[index].file;
                info.textContent =
                    index + 1 + ' / ' + SLIDES.length + ' — ' + SLIDES[index].title;
                prevBtn.disabled = index === 0;
                nextBtn.disabled = index === SLIDES.length - 1;
            }

            prevBtn.addEventListener('click', () => show(index - 1));
            nextBtn.addEventListener('click', () => show(index + 1));

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    e.preventDefault();
                    show(index + 1);
                } else if (e.key === 'ArrowLeft') {
                    show(index - 1);
                } else if (e.key === 'Home') {
                    show(0);
                } else if (e.key === 'End') {
                    show(SLIDES.length - 1);
                }
            });

            window.addEventListener('resize', scale);
            show(0);
            scale();
        </script>
    </body>
</html>

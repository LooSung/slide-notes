<!--
    공통 Head 템플릿
    이 파일은 참고용입니다. 각 페이지의 <head>에 아래 내용을 포함하세요.
    
    사용법:
    1. 아래 내용을 복사하여 각 페이지의 <head>에 붙여넣기
    2. <title> 태그만 각 페이지에 맞게 수정
    3. 페이지별 특수 스타일은 <style> 태그에 추가
-->

<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>페이지 제목</title>

<!-- Tailwind CSS -->
<link
    href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
    rel="stylesheet"
/>

<!-- Google Fonts -->
<link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&family=Black+Han+Sans&display=swap"
    rel="stylesheet"
/>

<!-- Font Awesome -->
<link
    href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
    rel="stylesheet"
/>

<!-- 공통 CSS -->
<link rel="stylesheet" href="../css/common.css" />

<!-- 페이지별 스타일은 여기에 추가 -->
<style>
    /* 페이지별 고유 스타일 */
</style>

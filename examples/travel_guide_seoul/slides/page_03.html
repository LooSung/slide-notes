<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>서울 여행 가이드 - 맛집</title>
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="../css/common.css" />
        <style>
            .slide-container { padding: 60px; }
            .keyword-card { background-color: #252526; border: 1px solid #3e3e42; }
        </style>
    </head>
    <body>
        <div class="slide-container">
            <div class="accent-bar"></div>
            <div class="flex-1 flex flex-col z-10">
                <p class="text-amber-400 font-bold tracking-widest text-sm uppercase mb-2">Restaurants</p>
                <h1 class="text-5xl font-black text-white mb-8">맛집</h1>
                <div class="grid grid-cols-2 gap-4">
                    <div class="keyword-card p-4 rounded-lg flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-900 bg-opacity-40 rounded-full flex items-center justify-center text-amber-400 shrink-0"><i class="fas fa-fire"></i></div>
                        <div>
                            <h3 class="font-bold text-lg text-white">우래옥</h3>
                            <p class="text-gray-400 text-sm">불고기 · 정통 한식</p>
                        </div>
                    </div>
                    <div class="keyword-card p-4 rounded-lg flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-900 bg-opacity-40 rounded-full flex items-center justify-center text-amber-400 shrink-0"><i class="fas fa-drumstick-bite"></i></div>
                        <div>
                            <h3 class="font-bold text-lg text-white">몽탄</h3>
                            <p class="text-gray-400 text-sm">우대갈비</p>
                        </div>
                    </div>
                    <div class="keyword-card p-4 rounded-lg flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-900 bg-opacity-40 rounded-full flex items-center justify-center text-amber-400 shrink-0"><i class="fas fa-utensils"></i></div>
                        <div>
                            <h3 class="font-bold text-lg text-white">명동교자</h3>
                            <p class="text-gray-400 text-sm">만두 · 칼국수</p>
                        </div>
                    </div>
                    <div class="keyword-card p-4 rounded-lg flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-900 bg-opacity-40 rounded-full flex items-center justify-center text-amber-400 shrink-0"><i class="fas fa-bacon"></i></div>
                        <div>
                            <h3 class="font-bold text-lg text-white">금돼지식당</h3>
                            <p class="text-gray-400 text-sm">돼지고기 · 삼겹</p>
                        </div>
                    </div>
                    <div class="keyword-card p-4 rounded-lg flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-900 bg-opacity-40 rounded-full flex items-center justify-center text-amber-400 shrink-0"><i class="fas fa-mortar-pestle"></i></div>
                        <div>
                            <h3 class="font-bold text-lg text-white">삼원가든</h3>
                            <p class="text-gray-400 text-sm">삼계탕</p>
                        </div>
                    </div>
                    <div class="keyword-card p-4 rounded-lg flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-900 bg-opacity-40 rounded-full flex items-center justify-center text-amber-400 shrink-0"><i class="fas fa-bowl-food"></i></div>
                        <div>
                            <h3 class="font-bold text-lg text-white">삼청동수제비</h3>
                            <p class="text-gray-400 text-sm">수제비 · 국물</p>
                        </div>
                    </div>
                </div>
                <p class="text-gray-500 text-sm mt-4">식신, 트립어드바이저 등에서 리뷰·순위 확인 추천</p>
            </div>
        </div>
    </body>
</html>

<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>서울 여행 가이드 - 대표 명소</title>
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="../css/common.css" />
        <style>
            .slide-container { padding: 60px; }
            .keyword-card { background-color: #252526; border: 1px solid #3e3e42; }
        </style>
    </head>
    <body>
        <div class="slide-container">
            <div class="accent-bar"></div>
            <div class="flex-1 flex flex-col z-10">
                <p class="text-blue-400 font-bold tracking-widest text-sm uppercase mb-2">Attractions</p>
                <h1 class="text-5xl font-black text-white mb-10">대표 명소</h1>
                <div class="grid grid-cols-2 gap-8 flex-1">
                    <div class="keyword-card p-6 rounded-xl">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-12 h-12 bg-amber-900 bg-opacity-40 rounded-full flex items-center justify-center text-amber-400">
                                <i class="fas fa-landmark"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-white">경복궁</h2>
                        </div>
                        <p class="text-gray-300 text-base mb-3">1395년 창건, 조선의 정궁. 근정전·경회루·향원정 등 목조건축 걸작.</p>
                        <ul class="text-gray-400 text-sm space-y-1">
                            <li>입장료: 성인 3,000원 (한복 착용 시 무료)</li>
                            <li>휴무: 매주 화요일</li>
                            <li>하이라이트: 수문장 교대의식 10:00, 14:00</li>
                        </ul>
                    </div>
                    <div class="keyword-card p-6 rounded-xl">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-12 h-12 bg-blue-900 bg-opacity-40 rounded-full flex items-center justify-center text-blue-400">
                                <i class="fas fa-tower-broadcast"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-white">N서울타워</h2>
                        </div>
                        <p class="text-gray-300 text-base mb-3">남산 정상, 해발 480m에서 서울 360도 전망. 외국인 선정 관광 1위.</p>
                        <ul class="text-gray-400 text-sm space-y-1">
                            <li>전망대: 대인 26,000원 / 소인 20,000원</li>
                            <li>케이블카 왕복 15,000원</li>
                            <li>사랑의 자물쇠·하트 의자 등 로맨틱 포인트</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>

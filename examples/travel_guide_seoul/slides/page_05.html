<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>서울 여행 가이드 - 이동·팁</title>
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="../css/common.css" />
        <style>
            .slide-container { padding: 60px; }
            .keyword-card { background-color: #252526; border: 1px solid #3e3e42; }
        </style>
    </head>
    <body>
        <div class="slide-container">
            <div class="accent-bar"></div>
            <div class="flex-1 flex flex-col z-10">
                <p class="text-emerald-400 font-bold tracking-widest text-sm uppercase mb-2">Transport & Tips</p>
                <h1 class="text-5xl font-black text-white mb-8">이동·팁</h1>
                <div class="grid grid-cols-2 gap-8">
                    <div class="keyword-card p-6 rounded-xl">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-12 h-12 bg-emerald-900 bg-opacity-40 rounded-full flex items-center justify-center text-emerald-400">
                                <i class="fas fa-wallet"></i>
                            </div>
                            <h2 class="text-xl font-bold text-white">교통카드 필수</h2>
                        </div>
                        <p class="text-gray-300 text-sm mb-2">티머니(T-money)·캐시비(Cashbee) 또는 모바일페이 사용. 현금 탑승 시 환승 혜택 없음.</p>
                    </div>
                    <div class="keyword-card p-6 rounded-xl">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-12 h-12 bg-blue-900 bg-opacity-40 rounded-full flex items-center justify-center text-blue-400">
                                <i class="fas fa-train-subway"></i>
                            </div>
                            <h2 class="text-xl font-bold text-white">지하철</h2>
                        </div>
                        <p class="text-gray-300 text-sm">1~9호선, 신분당선, 경의중앙선, 공항철도 등. 서울교통공사 사이버스테이션에서 노선·경로 확인.</p>
                    </div>
                    <div class="keyword-card p-6 rounded-xl col-span-2">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="w-12 h-12 bg-amber-900 bg-opacity-40 rounded-full flex items-center justify-center text-amber-400">
                                <i class="fas fa-arrows-rotate"></i>
                            </div>
                            <h2 class="text-xl font-bold text-white">환승 활용</h2>
                        </div>
                        <ul class="text-gray-300 text-sm space-y-1">
                            <li>탑승·하차 시 모두 카드 태그 → <strong class="text-white">30분 이내</strong> 다른 대중교통 환승 (심야 21시~07시는 1시간)</li>
                            <li>총 <strong class="text-white">4회까지 환승</strong> 가능 (최대 5가지 수단), 동일 노선 재탑승은 환승 미인정</li>
                            <li>전체 이동거리 기준 일괄 요금 적용</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>

<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>서울 여행 가이드 - 커버</title>
        <link
            href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&family=Black+Han+Sans&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../css/common.css" />
        <style>
            .slide-container {
                background-image:
                    radial-gradient(
                        circle at 20% 30%,
                        rgba(0, 122, 204, 0.08) 0%,
                        transparent 25%
                    ),
                    radial-gradient(
                        circle at 80% 70%,
                        rgba(255, 193, 7, 0.06) 0%,
                        transparent 25%
                    );
            }
        </style>
    </head>
    <body>
        <div class="slide-container">
            <div class="accent-bar"></div>
            <div class="absolute top-20 left-20 text-7xl text-gray-700 opacity-5">
                <i class="fas fa-map-marked-alt"></i>
            </div>
            <div class="absolute bottom-20 right-20 text-9xl text-gray-700 opacity-5">
                <i class="fas fa-landmark"></i>
            </div>
            <div class="flex-1 flex flex-col justify-center items-center z-10 px-12">
                <h1
                    class="text-8xl mb-4 font-black tracking-tight text-white title-glow relative"
                >
                    <span class="text-blue-400">서울</span> 여행 가이드
                </h1>
                <div class="w-32 h-1 bg-gray-500 mb-8 rounded-full"></div>
                <p class="text-3xl font-light text-gray-300 mb-12 text-center leading-relaxed">
                    AI와 함께하는
                    <span class="font-bold text-white border-b-2 border-blue-500">서울 핵심 코스</span>
                </p>
                <div class="grid grid-cols-3 gap-6 w-full max-w-4xl">
                    <div class="keyword-card p-4 rounded-lg flex items-center space-x-4 transform transition hover:-translate-y-1">
                        <div class="w-12 h-12 bg-blue-900 bg-opacity-30 rounded-full flex items-center justify-center text-blue-400 text-xl">
                            <i class="fas fa-mountain-city"></i>
                        </div>
                        <div>
                            <p class="font-bold text-lg">대표 명소</p>
                        </div>
                    </div>
                    <div class="keyword-card p-4 rounded-lg flex items-center space-x-4 transform transition hover:-translate-y-1">
                        <div class="w-12 h-12 bg-amber-900 bg-opacity-30 rounded-full flex items-center justify-center text-amber-400 text-xl">
                            <i class="fas fa-utensils"></i>
                        </div>
                        <div>
                            <p class="font-bold text-lg">맛집·카페</p>
                        </div>
                    </div>
                    <div class="keyword-card p-4 rounded-lg flex items-center space-x-4 transform transition hover:-translate-y-1">
                        <div class="w-12 h-12 bg-emerald-900 bg-opacity-30 rounded-full flex items-center justify-center text-emerald-400 text-xl">
                            <i class="fas fa-route"></i>
                        </div>
                        <div>
                            <p class="font-bold text-lg">이동·팁</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="w-full h-2 bg-gray-800 flex">
                <div class="w-1/3 h-full bg-blue-500"></div>
                <div class="w-1/3 h-full bg-amber-500"></div>
                <div class="w-1/3 h-full bg-emerald-500"></div>
            </div>
        </div>
    </body>
</html>

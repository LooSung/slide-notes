<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>서울 여행 가이드 - 카페</title>
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="../css/common.css" />
        <style>
            .slide-container { padding: 60px; }
            .keyword-card { background-color: #252526; border: 1px solid #3e3e42; }
        </style>
    </head>
    <body>
        <div class="slide-container">
            <div class="accent-bar"></div>
            <div class="flex-1 flex flex-col z-10">
                <p class="text-amber-300 font-bold tracking-widest text-sm uppercase mb-2">Cafes</p>
                <h1 class="text-5xl font-black text-white mb-8">카페</h1>
                <div class="grid grid-cols-3 gap-4">
                    <div class="keyword-card p-4 rounded-lg">
                        <p class="text-blue-400 text-xs font-bold uppercase mb-2">연남동</p>
                        <h3 class="font-bold text-white mb-1">카페 레이어드</h3>
                        <p class="text-gray-400 text-sm">스콘 맛집 · 빈티지 영국풍</p>
                        <h3 class="font-bold text-white mt-3 mb-1">카페 러프</h3>
                        <p class="text-gray-400 text-sm">얼그레이 밀크티 · 레몬파운드</p>
                    </div>
                    <div class="keyword-card p-4 rounded-lg">
                        <p class="text-emerald-400 text-xs font-bold uppercase mb-2">성수동</p>
                        <h3 class="font-bold text-white mb-1">대림창고</h3>
                        <p class="text-gray-400 text-sm">붉은 벽돌 · 복합문화공간</p>
                        <h3 class="font-bold text-white mt-3 mb-1">블루보틀</h3>
                        <p class="text-gray-400 text-sm">핸드드립 · 미니멀</p>
                        <h3 class="font-bold text-white mt-3 mb-1">언더프레셔</h3>
                        <p class="text-gray-400 text-sm">통창 · 레몬마들렌</p>
                    </div>
                    <div class="keyword-card p-4 rounded-lg">
                        <p class="text-purple-400 text-xs font-bold uppercase mb-2">기타</p>
                        <h3 class="font-bold text-white mb-1">세컨드버치 (익선동)</h3>
                        <p class="text-gray-400 text-sm">한옥 · 벨기에 와플</p>
                        <h3 class="font-bold text-white mt-3 mb-1">% 아라비카 (강남)</h3>
                        <p class="text-gray-400 text-sm">스페셜티 · 시티뷰</p>
                        <h3 class="font-bold text-white mt-3 mb-1">앤트러사이트 (한남)</h3>
                        <p class="text-gray-400 text-sm">공장 개조 · 빈티지</p>
                    </div>
                </div>
                <p class="text-gray-500 text-sm mt-4">평일 낮·이른 오전 방문 시 여유 있게 이용 가능</p>
            </div>
        </div>
    </body>
</html>
